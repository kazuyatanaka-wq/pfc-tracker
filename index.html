<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PFC">
<meta name="theme-color" content="#0d0d1a">
<title>PFC Tracker</title>
<style>
:root{--bg:#0d0d1a;--card:#13132a;--border:#1e1e3a;--border2:#2a2a45;--text:#e0e0e0;--sub:#888;--dim:#555;--accent:#b8a9e8;--purple:#7c6bb5;--orange:#e8a87c;--green:#6bb5a0;--red:#ff6b6b;--font:'Helvetica Neue','Hiragino Sans',sans-serif;--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font)}
button{cursor:pointer;border:none;font-family:var(--font)}
.app{display:flex;flex-direction:column;height:100dvh}
.header{padding:calc(var(--safe-t) + 12px) 16px 0;flex-shrink:0}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.logo{font-size:18px;font-weight:300;letter-spacing:3px;color:var(--accent)}
.sync{font-size:10px;color:var(--dim);margin-bottom:8px}
.sync.ok{color:var(--green)}
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:10px 0;background:none;color:var(--dim);font-size:12px;border-bottom:2px solid transparent}
.tab.on{color:var(--accent);border-bottom-color:var(--purple);background:var(--border);font-weight:700}
.panel{flex:1;overflow-y:auto;padding:12px 16px calc(var(--safe-b) + 12px);-webkit-overflow-scrolling:touch}
.panel[hidden]{display:none}
.card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.lbl{font-size:10px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
textarea{width:100%;min-height:200px;background:var(--bg);border:1px solid var(--border2);border-radius:10px;color:#c0c0c0;font-size:13px;padding:12px;resize:vertical;line-height:1.6;outline:none;font-family:inherit;box-sizing:border-box}
textarea:focus{border-color:var(--purple)}
.btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--purple),#5a4f8a);touch-action:manipulation;margin-top:10px}
.btn:active{opacity:.7}
.btn-s{padding:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--sub);font-size:11px}
.btn-del{background:none;border:1px solid #3a2020;border-radius:6px;color:var(--red);font-size:11px;padding:5px 10px;margin-top:10px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;text-align:center;padding:8px 0}
.stat-v{font-size:20px;font-weight:300;color:var(--accent)}
.stat-l{font-size:9px;color:var(--dim);letter-spacing:1px;margin-bottom:2px}
.stat-u{font-size:9px;color:var(--dim);margin-top:1px}
.bar{margin-bottom:5px}
.bar-h{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:2px}
.bar-t{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-f{height:100%;border-radius:3px;transition:width .4s}
.hi{cursor:pointer}
.hi-top{display:flex;justify-content:space-between;align-items:center}
.hi-date{font-size:14px;font-weight:600;color:var(--accent)}
.hi-pfc{display:flex;gap:10px;margin-top:4px;font-size:12px}
.hi-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.hi-tag{font-size:10px;border-radius:6px;padding:2px 7px}
.hi-detail{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.meal{font-size:12px;color:#999;margin-bottom:3px}
.meal b{color:var(--purple);font-weight:600}
.tr-item{font-size:12px;color:#ddd;margin-bottom:6px}
.tr-detail{font-size:11px;color:var(--sub);padding-left:18px;margin-top:1px;line-height:1.4}
.summary{font-size:12px;color:#999;line-height:1.6;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.toast{position:fixed;top:calc(var(--safe-t) + 12px);left:50%;transform:translateX(-50%);background:#2d2d4a;color:var(--accent);padding:10px 24px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;display:none}
.toast.show{display:block;animation:fadeIn .3s}
.warn{background:#2a1a1a;border:1px solid #5a3030;border-radius:8px;padding:10px;margin-bottom:10px;font-size:12px;color:#ff9999}
.chart-s{overflow-x:auto;-webkit-overflow-scrolling:touch}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-row">
      <div class="logo">PFC TRACKER</div>
      <div><button class="btn-s" onclick="doCSV()">CSV↓</button> <button class="btn-s" onclick="doCopy()">📋AI用</button></div>
    </div>
    <div class="sync" id="syncStatus">起動中...</div>
  </div>
  <div class="tabs">
    <button class="tab on" id="t0" onclick="showTab(0)">📥 取込</button>
    <button class="tab" id="t1" onclick="showTab(1)">📋 履歴</button>
    <button class="tab" id="t2" onclick="showTab(2)">📊 分析</button>
  </div>
  <div class="panel" id="p0">
    <div class="card">
      <div class="lbl">GEMINI日報を貼り付け</div>
      <textarea id="ta" placeholder="ここにGeminiのテキストを貼り付け"></textarea>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <span id="cc" style="font-size:11px;color:var(--dim)"></span>
        <span id="pe" style="font-size:11px;color:var(--red)"></span>
      </div>
      <button class="btn" id="parseBtn">解析する →</button>
    </div>
    <div id="previewArea"></div>
    <div id="latestArea"></div>
  </div>
  <div class="panel" id="p1" hidden></div>
  <div class="panel" id="p2" hidden></div>
</div>
<div class="toast" id="toast"></div>
<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbynR6KpXq6nniD90sJbgrrfP1SqYaI_zX9O4LJgpp0DurC5N3hpW1mcqzEAyzy1-DBX/exec';
const GAS_ON=!!GAS_URL;const KEY='pfc-v4';const TGT={w:73,p:180,f:45,c:160,cal:1850};
const SEED=[
{d:'2026-03-15',w:'81.30',bf:'22.60',mm:'59.70'},{d:'2026-03-14',w:'81.20',bf:'23.40',mm:'59.00'},
{d:'2026-03-13',w:'81.50',bf:'23.90',mm:'58.90'},{d:'2026-03-12',w:'81.60',bf:'24.30',mm:'58.60'},
{d:'2026-03-11',w:'81.20',bf:'23.30',mm:'59.00'},{d:'2026-03-10',w:'81.60',bf:'24.80',mm:'58.20'},
{d:'2026-03-09',w:'80.50',bf:'24.10',mm:'58.00'},{d:'2026-03-08',w:'81.10',bf:'23.80',mm:'58.60'},
{d:'2026-03-07',w:'81.70',bf:'23.90',mm:'58.90'},{d:'2026-03-06',w:'82.20',bf:'24.80',mm:'58.60'},
{d:'2026-03-05',w:'82.10',bf:'24.80',mm:'58.50'},{d:'2026-03-04',w:'82.20',bf:'25.40',mm:'58.10'},
{d:'2026-03-03',w:'82.60',bf:'25.00',mm:'58.70'},{d:'2026-03-02',w:'82.90',bf:'25.20',mm:'58.80'},
{d:'2026-03-01',w:'83.00',bf:'25.50',mm:'58.60'}
].map(s=>({date:s.d,weight:s.w,bodyFat:s.bf,muscleMass:s.mm,bmi:'',visceralFat:'',basalMetabolism:'',bodyAge:'',boneMass:'',pfc:{p:'',f:'',c:'',cal:''},meals:{breakfast:'',lunch:'',snack:'',dinner:''},trainingTarget:'',training:[],theme:'',summary:''}));
let entries=[],preview=null,expanded=null;
function saveLocal(){try{localStorage.setItem(KEY,JSON.stringify(entries))}catch(e){}}
function loadLocal(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):null}catch(e){return null}}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.className='toast show';setTimeout(()=>t.className='toast',2500)}
function syncSt(m,ok){const el=document.getElementById('syncStatus');el.textContent=m;el.className=ok?'sync ok':'sync'}
async function gasGet(){if(!GAS_ON)return null;try{const r=await fetch(GAS_URL+'?action=getAll');const j=await r.json();return j.entries||[]}catch(e){return null}}
async function gasSave(entry){if(!GAS_ON)return;try{await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'payload='+encodeURIComponent(JSON.stringify({action:'save',entry}))})}catch(e){}}
async function gasDel(date){if(!GAS_ON)return;try{await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'payload='+encodeURIComponent(JSON.stringify({action:'delete',date}))})}catch(e){}}
function parse(raw){
  const text=raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const e={date:'',weight:'',bodyFat:'',muscleMass:'',bmi:'',visceralFat:'',basalMetabolism:'',bodyAge:'',boneMass:'',pfc:{p:'',f:'',c:'',cal:''},meals:{breakfast:'',lunch:'',snack:'',dinner:''},trainingTarget:'',training:[],theme:'',summary:''};
  let m=text.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if(!m)m=text.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m)e.date=m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  const g=l=>{const x=text.match(new RegExp(l+'[：:]\\s*約?\\s*([\\d.]+)'));return x?x[1]:''};
  e.weight=g('体重');e.bodyFat=g('体脂肪率');e.muscleMass=g('筋肉量');e.bmi=g('BMI');
  e.visceralFat=g('内臓脂肪レベル');e.basalMetabolism=g('基礎代謝量');e.bodyAge=g('体内年齢');e.boneMass=g('推定骨量');
  let pm=text.match(/P[（(].*?[）)][：:].*?約?\s*([\d.]+)/);if(!pm)pm=text.match(/P\s*(\d+)\s*g/);
  let fm=text.match(/F[（(].*?[）)][：:].*?約?\s*([\d.]+)/);if(!fm)fm=text.match(/F\s*(\d+)\s*g/);
  let cm=text.match(/C[（(].*?[）)][：:].*?約?\s*([\d.]+)/);if(!cm)cm=text.match(/C\s*(\d+)\s*g/);
  if(pm)e.pfc.p=pm[1];if(fm)e.pfc.f=fm[1];if(cm)e.pfc.c=cm[1];
  const calM=text.match(/総カロリー[：:].*?約?\s*([\d,]+)/);
  if(calM)e.pfc.cal=calM[1].replace(/,/g,'');
  else if(e.pfc.p&&e.pfc.f&&e.pfc.c)e.pfc.cal=String(Math.round(e.pfc.p*4+e.pfc.f*9+e.pfc.c*4));
  const tgt=text.match(/対象部位[：:]\s*(.+)/);if(tgt)e.trainingTarget=tgt[1].trim();
  if(!e.trainingTarget){const t2=text.match(/トレーニング[^\n]*[（(]([^）)]+)[）)]/);if(t2)e.trainingTarget=t2[1].trim()}
  if(!e.trainingTarget){const t3=text.match(/トレーニング[＆&]?[^\n】]*】/);if(t3){const m3=t3[0].match(/[（(]([^）)]+)[）)]/);if(m3)e.trainingTarget=m3[1].trim()}}
  text.split('\n').forEach(ln=>{
    // Match: ・種目1：, ・種目：, ①, ②, etc.
    let ex=ln.match(/^[・]?種目\d*[：:]\s*(.+)/);
    if(!ex)ex=ln.match(/^[①②③④⑤⑥⑦⑧⑨⑩]\s*(.+)/);
    if(ex){const c=ex[1].trim(),p=c.split(/\s*\/\s*/);if(p.length>=3)e.training.push({name:p[0],detail:p.slice(1).join(' / ')});else e.training.push({name:c,detail:''})}
  });
  // Grab detail lines (時間, 消費カロリー, 心拍数) and attach to last exercise if detail is empty
  if(e.training.length && !e.training[e.training.length-1].detail){
    const details=[];
    const timeM=text.match(/[・]?時間[：:]\s*(.+)/);const calM2=text.match(/[・]?消費カロリー[：:]\s*(.+)/);const hrM=text.match(/[・]?平均心拍[数]?[：:]\s*(.+)/);
    if(timeM)details.push(timeM[1].trim());if(calM2)details.push(calM2[1].trim());if(hrM)details.push('心拍'+hrM[1].trim());
    if(details.length)e.training[e.training.length-1].detail=details.join(' / ');
  }
  if(!e.trainingTarget && e.training.length===1)e.trainingTarget=e.training[0].name;
  const ml=l=>{const x=text.match(new RegExp('[・]?'+l+'[：:]\\s*(.+)','m'));return x?x[1].trim():''};
  e.meals.breakfast=ml('朝食');e.meals.lunch=ml('昼食');e.meals.snack=ml('間食');e.meals.dinner=ml('夕食');
  const th=text.match(/テーマ[：:]\s*(.+)/);if(th)e.theme=th[1].trim();
  for(const ln of text.split('\n')){if(ln.indexOf('総評')!==-1){const ci=ln.search(/[：:]/);if(ci!==-1){e.summary=ln.substring(ci+1).trim();break}}}
  if(!e.summary){const s2=text.match(/(?:総括|振り返り)[^\n]*\n([\s\S]*?)(?=\n■|\n【|$)/);if(s2)e.summary=s2[1].trim()}
  return e;
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function bar(l,v,t,c,u='g'){const n=+v||0;const p=t?Math.min(n/t*100,120):0;const o=n>t*1.1;return`<div class="bar"><div class="bar-h"><span style="font-weight:600;color:#c0c0c0">${l}</span><span><b style="color:${o?'var(--red)':'var(--text)'}">${n}</b><span style="color:var(--dim)"> / ${t}${u}</span></span></div><div class="bar-t"><div class="bar-f" style="width:${Math.min(p,100)}%;background:${o?'var(--red)':c}"></div></div></div>`}
function stat(l,v,u,c){return`<div><div class="stat-l">${l}</div><div class="stat-v" style="color:${c||'var(--accent)'}">${v||'-'}</div>${u?'<div class="stat-u">'+u+'</div>':''}</div>`}
function showTab(n){[0,1,2].forEach(i=>{document.getElementById('p'+i).hidden=i!==n;document.getElementById('t'+i).className=i===n?'tab on':'tab'});if(n===1)renderHistory();if(n===2)renderTrends()}
document.getElementById('ta').addEventListener('input',function(){document.getElementById('cc').textContent=this.value.length?this.value.length+'文字':'';document.getElementById('pe').textContent=''});
document.getElementById('parseBtn').addEventListener('click',function(){
  const text=document.getElementById('ta').value.trim();
  if(!text){toast('テキストを貼り付けてください');return}
  const p=parse(text);
  if(!p.date){document.getElementById('pe').textContent='⚠️ 日付が認識できません';return}
  preview=p;renderPreview();
});
function renderPreview(){
  if(!preview){document.getElementById('previewArea').innerHTML='';return}
  const p=preview;const exists=entries.find(e=>e.date===p.date);let h='';
  if(exists)h+=`<div class="warn">⚠️ ${p.date} は既存。保存で上書き。</div>`;
  h+=`<div class="card"><div class="lbl">📅 ${p.date}</div><div class="stats">${stat('体重',p.weight,'kg','var(--accent)')}${stat('体脂肪',p.bodyFat,'%','var(--orange)')}${stat('筋肉量',p.muscleMass,'kg','var(--green)')}</div><div class="stats">${stat('BMI',p.bmi,'','var(--sub)')}${stat('内臓脂肪',p.visceralFat,'','var(--sub)')}${stat('基礎代謝',p.basalMetabolism,'kcal','var(--sub)')}</div></div>`;
  h+=`<div class="card"><div class="lbl">PFC</div>${bar('P',p.pfc.p,TGT.p,'var(--purple)')}${bar('F',p.pfc.f,TGT.f,'var(--orange)')}${bar('C',p.pfc.c,TGT.c,'var(--green)')}${bar('CAL',p.pfc.cal,TGT.cal,'var(--accent)','kcal')}</div>`;
  const meals=[['朝食',p.meals.breakfast],['昼食',p.meals.lunch],['間食',p.meals.snack],['夕食',p.meals.dinner]].filter(x=>x[1]);
  if(meals.length){h+=`<div class="card"><div class="lbl">🍽️ 食事</div>`;meals.forEach(([l,v])=>h+=`<div class="meal"><b>${l}:</b> ${esc(v)}</div>`);h+=`</div>`}
  if(p.training.length||p.trainingTarget){h+=`<div class="card"><div class="lbl">🏋️ ${p.trainingTarget||'トレーニング'}</div>`;p.training.forEach((t,i)=>h+=`<div class="tr-item"><span style="color:var(--green);font-weight:600">${i+1}.</span> ${esc(t.name)}${t.detail?'<div class="tr-detail">'+esc(t.detail)+'</div>':''}</div>`);h+=`</div>`}
  if(p.summary)h+=`<div class="card"><div class="lbl">📝 総評</div><div style="font-size:13px;color:#999;line-height:1.6">${esc(p.summary)}</div></div>`;
  h+=`<div style="display:flex;gap:10px;margin-top:12px"><button class="btn" style="flex:1;background:var(--card);color:var(--sub);border:1px solid var(--border2)" onclick="preview=null;renderPreview()">戻る</button><button class="btn" style="flex:2" onclick="doSave()">💾 保存</button></div>`;
  document.getElementById('previewArea').innerHTML=h;
}
async function doSave(){
  if(!preview)return;const entry={...preview};
  const idx=entries.findIndex(e=>e.date===entry.date);if(idx>=0)entries[idx]=entry;else entries.push(entry);
  entries.sort((a,b)=>b.date.localeCompare(a.date));saveLocal();toast(entry.date+' 保存完了');
  if(GAS_ON){syncSt('保存中...',false);await gasSave(entry);syncSt('✅ 同期済 ('+new Date().toLocaleTimeString('ja-JP')+')',true)}
  preview=null;document.getElementById('ta').value='';document.getElementById('cc').textContent='';renderPreview();renderLatest();showTab(1);
}
function renderLatest(){
  if(!entries.length){document.getElementById('latestArea').innerHTML='';return}
  const e=entries[0];document.getElementById('latestArea').innerHTML=`<div class="card"><div class="lbl">LATEST</div><div class="stats">${stat('最新体重',e.weight,'kg','var(--accent)')}${stat('体脂肪',e.bodyFat,'%','var(--orange)')}${stat('記録',entries.length,'日','var(--green)')}</div></div>`;
}
function renderHistory(){
  const el=document.getElementById('p1');let h=`<div style="font-size:13px;color:var(--dim);margin-bottom:10px">${entries.length}件</div>`;
  if(!entries.length){h+='<div style="text-align:center;color:var(--dim);padding:40px">記録なし</div>';el.innerHTML=h;return}
  entries.forEach(e=>{
    const open=expanded===e.date,hasT=e.trainingTarget||(e.training&&e.training.length),hasM=e.meals?.breakfast||e.meals?.lunch||e.meals?.dinner;
    const mp=[e.meals?.breakfast?'朝':'',e.meals?.lunch?'昼':'',e.meals?.snack?'間':'',e.meals?.dinner?'夜':''].filter(Boolean).join('・');
    h+=`<div class="card hi" onclick="expanded=expanded==='${e.date}'?null:'${e.date}';renderHistory()"><div class="hi-top"><div class="hi-date">${e.date}</div><div><span style="font-size:12px;color:#ddd">${e.weight}kg</span> <span style="font-size:11px;color:var(--sub)">体脂肪${e.bodyFat}%</span> <span style="color:var(--dim)">${open?'▲':'▼'}</span></div></div>`;
    h+=`<div class="hi-pfc"><span style="color:var(--purple)">P:${e.pfc?.p||0}g</span><span style="color:var(--orange)">F:${e.pfc?.f||0}g</span><span style="color:var(--green)">C:${e.pfc?.c||0}g</span><span style="color:var(--sub)">${e.pfc?.cal||0}kcal</span></div>`;
    if(hasT||hasM){h+=`<div class="hi-tags">`;if(hasT)h+=`<span class="hi-tag" style="background:#1a2e1a;border:1px solid #2e4a2e;color:var(--green)">🏋️ ${esc(e.trainingTarget||(e.training||[]).map(t=>t.name).slice(0,2).join(', '))}</span>`;if(hasM)h+=`<span class="hi-tag" style="background:#1a1a2e;border:1px solid #2e2e5a;color:var(--accent)">🍽️ ${mp}</span>`;h+=`</div>`}
    if(open){h+=`<div class="hi-detail"><div class="stats">${stat('筋肉量',e.muscleMass,'kg','var(--green)')}${stat('内臓脂肪',e.visceralFat,'','var(--sub)')}${stat('基礎代謝',e.basalMetabolism,'kcal','var(--sub)')}</div>`;
      h+=bar('P',e.pfc?.p,TGT.p,'var(--purple)')+bar('F',e.pfc?.f,TGT.f,'var(--orange)')+bar('C',e.pfc?.c,TGT.c,'var(--green)');
      if(hasT){h+=`<div style="margin-top:10px;font-size:11px;color:var(--green);font-weight:600">🏋️ ${e.trainingTarget||'TRAINING'}</div>`;(e.training||[]).forEach((t,i)=>h+=`<div class="tr-item"><span style="color:var(--green);font-weight:600">${i+1}.</span> ${esc(t.name)}${t.detail?'<div class="tr-detail">'+esc(t.detail)+'</div>':''}</div>`)}
      if(hasM){h+=`<div style="margin-top:10px;font-size:11px;color:var(--accent);font-weight:600">🍽️ MEALS</div>`;[['朝食',e.meals?.breakfast],['昼食',e.meals?.lunch],['間食',e.meals?.snack],['夕食',e.meals?.dinner]].forEach(([l,v])=>{if(v)h+=`<div class="meal"><b>${l}</b> ${esc(v)}</div>`})}
      if(e.summary)h+=`<div class="summary"><b style="color:var(--sub)">📝</b> ${esc(e.summary)}</div>`;
      h+=`<button class="btn-del" onclick="event.stopPropagation();doDel('${e.date}')">削除</button></div>`}
    h+=`</div>`;});el.innerHTML=h;
}
async function doDel(date){if(!confirm(date+' を削除？'))return;entries=entries.filter(e=>e.date!==date);saveLocal();if(GAS_ON){await gasDel(date)}toast('削除');renderHistory();renderLatest()}
function renderTrends(){
  const el=document.getElementById('p2');const l7=entries.slice(0,7);
  const avgW=l7.filter(e=>e.weight).length?(l7.reduce((s,e)=>s+(+e.weight||0),0)/l7.filter(e=>e.weight).length).toFixed(1):'-';
  let h=`<div class="card"><div class="stats">${stat('平均体重',avgW,'直近7日','var(--accent)')}${stat('記録',entries.length,'日','var(--green)')}${stat('目標',TGT.w,'kg','var(--orange)')}</div></div>`;
  const wd=entries.filter(e=>e.weight).slice(0,21).reverse();
  if(wd.length>1){const ws=wd.map(e=>+e.weight),mn=Math.min(...ws,TGT.w)-1,mx=Math.max(...ws)+1,rg=mx-mn||1,ht=120,w=Math.max(wd.length*30,280),ty=ht-((TGT.w-mn)/rg)*ht;
    let sv=`<svg width="${w}" height="${ht+28}" viewBox="0 0 ${w} ${ht+28}"><line x1="0" y1="${ty}" x2="${w}" y2="${ty}" stroke="var(--purple)" stroke-dasharray="4 4" opacity=".4"/><text x="4" y="${ty-4}" fill="var(--purple)" font-size="8" opacity=".5">目標${TGT.w}</text><polyline fill="none" stroke="var(--accent)" stroke-width="2" points="${wd.map((e,i)=>`${i*30+15},${ht-((+e.weight-mn)/rg)*ht}`).join(' ')}"/>`;
    wd.forEach((e,i)=>{const y=ht-((+e.weight-mn)/rg)*ht;sv+=`<circle cx="${i*30+15}" cy="${y}" r="3" fill="var(--accent)"/><text x="${i*30+15}" y="${y-7}" fill="#999" font-size="8" text-anchor="middle">${e.weight}</text><text x="${i*30+15}" y="${ht+14}" fill="#444" font-size="7" text-anchor="middle">${e.date.slice(5)}</text>`});
    h+=`<div class="card"><div class="lbl">WEIGHT</div><div class="chart-s">${sv}</svg></div></div>`}
  const bd=entries.filter(e=>e.bodyFat).slice(0,21).reverse();
  if(bd.length>1){const vs=bd.map(e=>+e.bodyFat),mn=Math.min(...vs)-1,mx=Math.max(...vs)+1,rg=mx-mn||1,ht=90,w=Math.max(bd.length*30,280);
    let sv=`<svg width="${w}" height="${ht+28}" viewBox="0 0 ${w} ${ht+28}"><polyline fill="none" stroke="var(--orange)" stroke-width="2" points="${bd.map((e,i)=>`${i*30+15},${ht-((+e.bodyFat-mn)/rg)*ht}`).join(' ')}"/>`;
    bd.forEach((e,i)=>{const y=ht-((+e.bodyFat-mn)/rg)*ht;sv+=`<circle cx="${i*30+15}" cy="${y}" r="3" fill="var(--orange)"/><text x="${i*30+15}" y="${y-7}" fill="#999" font-size="8" text-anchor="middle">${e.bodyFat}%</text><text x="${i*30+15}" y="${ht+14}" fill="#444" font-size="7" text-anchor="middle">${e.date.slice(5)}</text>`});
    h+=`<div class="card"><div class="lbl">BODY FAT</div><div class="chart-s">${sv}</svg></div></div>`}
  if(l7.length){const a={p:0,f:0,c:0,cal:0};l7.forEach(e=>{a.p+=(+e.pfc?.p||0);a.f+=(+e.pfc?.f||0);a.c+=(+e.pfc?.c||0);a.cal+=(+e.pfc?.cal||0)});const n=l7.length;
    h+=`<div class="card"><div class="lbl">7日間平均</div>${bar('P',Math.round(a.p/n),TGT.p,'var(--purple)')}${bar('F',Math.round(a.f/n),TGT.f,'var(--orange)')}${bar('C',Math.round(a.c/n),TGT.c,'var(--green)')}${bar('CAL',Math.round(a.cal/n),TGT.cal,'var(--accent)','kcal')}</div>`}
  h+=`<button class="btn" onclick="doCopy()">📋 サマリーコピー</button>`;el.innerHTML=h;
}
function doCSV(){if(!entries.length)return;const h="日付,体重,体脂肪率,筋肉量,P,F,C,Cal,部位,トレーニング,朝食,昼食,間食,夕食,テーマ,総評\n";const rows=entries.map(e=>{const tr=(e.training||[]).map(t=>t.name+(t.detail?' '+t.detail:'')).join('; ');return[e.date,e.weight,e.bodyFat,e.muscleMass,e.pfc?.p,e.pfc?.f,e.pfc?.c,e.pfc?.cal,e.trainingTarget,'"'+tr+'"','"'+(e.meals?.breakfast||'')+'"','"'+(e.meals?.lunch||'')+'"','"'+(e.meals?.snack||'')+'"','"'+(e.meals?.dinner||'')+'"','"'+(e.theme||'')+'"','"'+(e.summary||'').replace(/"/g,'""')+'"'].join(',')});const b=new Blob(["\uFEFF"+h+rows.join("\n")],{type:"text/csv"});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='pfc_'+new Date().toISOString().split('T')[0]+'.csv';a.click();toast('CSV完了')}
function doCopy(){const r=entries.slice(0,7);if(!r.length)return;let t=`【直近${r.length}日PFC】\n目標:P${TGT.p}g F${TGT.f}g C${TGT.c}g(${TGT.cal}kcal)\n\n`;r.forEach(e=>{t+=`■${e.date}|${e.weight}kg 体脂肪${e.bodyFat}% 筋肉${e.muscleMass}kg\n PFC:P${e.pfc?.p||0}g F${e.pfc?.f||0}g C${e.pfc?.c||0}g(${e.pfc?.cal||0}kcal)\n`;if(e.trainingTarget)t+=` 🏋️${e.trainingTarget}\n`;if(e.summary)t+=` 総評:${e.summary}\n`;t+='\n'});navigator.clipboard.writeText(t).then(()=>toast('コピー完了')).catch(()=>{const x=document.createElement('textarea');x.value=t;x.style.cssText='position:fixed;left:-9999px';document.body.appendChild(x);x.select();document.execCommand('copy');document.body.removeChild(x);toast('コピー完了')})}
async function init(){
  const local=loadLocal();const map=new Map();
  SEED.forEach(s=>map.set(s.date,{...s}));(local||[]).forEach(e=>{const ex=map.get(e.date);if(!ex||(e.pfc?.p||e.meals?.breakfast||e.training?.length||e.summary))map.set(e.date,e)});
  entries=Array.from(map.values()).sort((a,b)=>b.date.localeCompare(a.date));saveLocal();renderLatest();
  if(GAS_ON){syncSt('同期中...',false);const sheet=await gasGet();
    if(sheet!==null){sheet.forEach(e=>map.set(e.date,e));entries=Array.from(map.values()).sort((a,b)=>b.date.localeCompare(a.date));saveLocal();renderLatest();
      if(sheet.length===0&&entries.length>0){syncSt('初期送信中...',false);for(const e of entries){await gasSave(e);await new Promise(r=>setTimeout(r,300))}}
      syncSt('✅ 同期済('+new Date().toLocaleTimeString('ja-JP')+')',true)}
    else syncSt('⚠️ オフライン',false)}
  else syncSt('ローカルのみ',false)
}
init();
</script>
