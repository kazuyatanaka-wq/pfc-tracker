<style>
:root {
  --bg: #0d0d1a; --card: #13132a; --border: #1e1e3a; --border2: #2a2a45;
  --text: #e0e0e0; --sub: #888; --dim: #555; --dimmer: #444;
  --accent: #b8a9e8; --purple: #7c6bb5; --purple-dark: #5a4f8a;
  --orange: #e8a87c; --green: #6bb5a0; --red: #ff6b6b;
  --font: 'DM Sans', 'Noto Sans JP', -apple-system, sans-serif;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font); background: var(--bg); color: var(--text); }
input, textarea, button { font-family: var(--font); }
button { cursor: pointer; border: none; -webkit-appearance: none; }
input, textarea { -webkit-appearance: none; outline: none; }

.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

/* Header */
.header { padding: calc(var(--safe-t) + 12px) 16px 0; background: var(--bg); flex-shrink: 0; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.logo { font-size: 18px; font-weight: 300; letter-spacing: 3px; color: var(--accent); }
.logo-sub { font-size: 9px; color: var(--dim); letter-spacing: 2px; margin-top: 1px; }
.header-actions { display: flex; gap: 6px; }
.btn-sm { padding: 6px 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--sub); font-size: 11px; font-weight: 500; }

/* Tabs */
.tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab { flex: 1; padding: 10px 0; background: none; color: var(--dim); font-size: 12px; font-weight: 400; letter-spacing: 0.5px; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab.active { color: var(--accent); border-bottom-color: var(--purple); font-weight: 700; background: var(--border); }

/* Content */
.content { flex: 1; overflow-y: auto; padding: 14px 16px calc(var(--safe-b) + 14px); -webkit-overflow-scrolling: touch; }

/* Cards */
.card { background: var(--card); border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
.card-label { font-size: 10px; color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }

/* Inputs */
.textarea-lg { width: 100%; min-height: 220px; background: var(--bg); border: 1px solid var(--border2); border-radius: 10px; color: #c0c0c0; font-size: 13px; padding: 12px; resize: none; line-height: 1.6; }
.textarea-lg:focus { border-color: var(--purple); }
.textarea-lg::placeholder { color: var(--dimmer); }

/* Buttons */
.btn { width: 100%; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600; letter-spacing: 0.5px; transition: opacity 0.2s; }
.btn:active { opacity: 0.7; }
.btn-primary { background: linear-gradient(135deg, var(--purple), var(--purple-dark)); color: #fff; }
.btn-secondary { background: var(--card); color: var(--sub); border: 1px solid var(--border2); }
.btn:disabled { opacity: 0.35; }
.btn-row { display: flex; gap: 10px; margin-top: 14px; }
.btn-row .btn { padding: 12px; font-size: 14px; }

/* PFC Bar */
.pfc-bar { margin-bottom: 6px; }
.pfc-bar-head { display: flex; justify-content: space-between; font-size: 12px; color: var(--sub); margin-bottom: 3px; }
.pfc-bar-label { font-weight: 600; color: #c0c0c0; letter-spacing: 1px; }
.pfc-bar-val { font-weight: 700; font-size: 14px; color: var(--text); }
.pfc-bar-val.over { color: var(--red); }
.pfc-bar-target { color: var(--dim); }
.pfc-bar-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.pfc-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

/* Mini stat */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); }
.mini-stat { text-align: center; padding: 10px 4px; }
.mini-stat-label { font-size: 9px; color: var(--dim); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 3px; }
.mini-stat-val { font-size: 20px; font-weight: 300; }
.mini-stat-sub { font-size: 9px; color: var(--dim); margin-top: 1px; }

/* History item */
.hist-item { cursor: pointer; }
.hist-head { display: flex; justify-content: space-between; align-items: center; }
.hist-date { font-size: 14px; font-weight: 600; color: var(--accent); }
.hist-weight { font-size: 12px; color: #ccc; }
.hist-bf { font-size: 11px; color: var(--sub); margin-left: 6px; }
.hist-pfc { display: flex; gap: 10px; margin-top: 5px; font-size: 12px; }
.hist-detail { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.hist-meal { font-size: 12px; color: #999; margin-bottom: 3px; }
.hist-meal b { color: var(--purple); font-weight: 600; }
.hist-training { font-size: 12px; color: var(--green); margin-top: 6px; }
.hist-summary { font-size: 12px; color: #777; margin-top: 6px; font-style: italic; }
.btn-delete { background: none; border: 1px solid #3a2020; border-radius: 6px; color: var(--red); font-size: 11px; padding: 5px 10px; margin-top: 10px; }

/* Preview */
.preview-warn { background: #2a1a1a; border: 1px solid #5a3030; border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 12px; color: #ff9999; }
.back-link { background: none; color: var(--dim); font-size: 12px; }

/* Toast */
.toast { position: fixed; top: calc(var(--safe-t) + 12px); left: 50%; transform: translateX(-50%); background: #2d2d4a; color: var(--accent); padding: 10px 24px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 999; box-shadow: 0 4px 20px rgba(124,107,181,0.3); animation: fadeIn 0.3s; pointer-events: none; }
.toast.hide { display: none; }

/* Chart */
.chart-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

/* Empty */
.empty { text-align: center; color: var(--dimmer); padding: 40px 0; font-size: 13px; }

/* Helper */
.desc { font-size: 12px; color: var(--sub); line-height: 1.6; margin-bottom: 14px; }
.note { font-size: 11px; color: var(--dimmer); text-align: center; margin-top: 8px; }
.mt12 { margin-top: 12px; }

@keyframes fadeIn { from { opacity:0; transform:translateX(-50%) translateY(-10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
</style>
</head>
<body>

<script>
// ===== Config =====
const STORAGE_KEY = 'pfc-tracker-v3';
const TARGET = { weight: 70, p: 150, f: 55, c: 180, cal: 1800 };

// ===== Google Sheets Sync Config =====
// ↓↓↓ ここにGASのデプロイURLを貼り付け ↓↓↓
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxQVRZky4TFFmmhMl16purpbXhtc0SMX7w6_GgWhQo6wLUbSmGwI2E8GOTkVabMZGpr/exec';
// ↑↑↑ 例: 'https://script.google.com/macros/s/XXXXX/exec' ↑↑↑

const GAS_ENABLED = GAS_URL && GAS_URL !== 'YOUR_GAS_DEPLOYMENT_URL_HERE';

// ===== State =====
let state = {

  view: 'import',      // import | preview | history | trends
  pasteText: '',
  preview: null,
  expandedDate: null,
  toast: '',
  syncing: false,

  lastSync: null,
};

const SEED_DATA = [

  {date:'2026-03-10',weight:'81.60',bodyFat:'24.80',muscleMass:'58.20',bmi:'',visceralFat:'',basalMetabolism:'',bodyAge:'',boneMass:'',pfc:{p:'',f:'',c:'',cal:''},meals:{breakfast:'',lunch:'',snack:'',dinner:''},trainingTarget:'',training:[],theme:'',summary:''},
  {date:'2026-03-09',weight:'80.50',bodyFat:'24.10',muscleMass:'58.00',bmi:'',visceralFat:'',basalMetabolism:'',bodyAge:'',boneMass:'',pfc:{p:'',f:'',c:'',cal:''},meals:{breakfast:'',lunch:'',snack:'',dinner:''},trainingTarget:'',training:[],theme:'',summary:''},
  {date:'2026-03-08',weight:'81.10',bodyFat:'23.80',muscleMass:'58.60',bmi:'',visceralFat:'',basalMetabolism:'',bodyAge:'',boneMass:'',pfc:{p:'',f:'',c:'',cal:''},meals:{breakfast:'',lunch:'',snack:'',dinner:''},trainingTarget:'',training:[],theme:'',summary:''},

  {date:'2026-03-02',weight:'82.90',bodyFat:'25.20',muscleMass:'58.80',bmi:'',visceralFat:'',basalMetabolism:'',bodyAge:'',boneMass:'',pfc:{p:'',f:'',c:'',cal:''},meals:{breakfast:'',lunch:'',snack:'',dinner:''},trainingTarget:'',training:[],theme:'',summary:''},
  {date:'2026-03-01',weight:'83.00',bodyFat:'25.50',muscleMass:'58.60',bmi:'',visceralFat:'',basalMetabolism:'',bodyAge:'',boneMass:'',pfc:{p:'',f:'',c:'',cal:''},meals:{breakfast:'',lunch:'',snack:'',dinner:''},trainingTarget:'',training:[],theme:'',summary:''},
];

// ===== Local Storage (cache) =====
function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveLocal() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.entries)); } catch(e) {}
}

// ===== Merge logic: スプレッドシート優先、ローカル・シードの追加分をマージ =====
function mergeEntries(sheetEntries, localEntries, seedEntries) {
  const map = new Map();
  // シードデータをベースに
  seedEntries.forEach(e => map.set(e.date, {...e}));
  // ローカルで上書き（PFCや食事データが入っている可能性）
  (localEntries||[]).forEach(e => {
    const existing = map.get(e.date);
    if (existing) {
      // ローカルの方がデータが多ければ上書き
      const hasMore = (e.pfc?.p || e.meals?.breakfast || e.training?.length || e.summary);
      if (hasMore) map.set(e.date, {...e});
    } else {
      map.set(e.date, {...e});
    }
  });
  // スプレッドシートが最優先（常に上書き）
  (sheetEntries||[]).forEach(e => map.set(e.date, {...e}));
  
  const result = Array.from(map.values());
  result.sort((a,b) => b.date.localeCompare(a.date));
  return result;
}

// ===== GAS API calls =====
async function gasGet() {
  if (!GAS_ENABLED) return null;
  try {
    const res = await fetch(GAS_URL + '?action=getAll');
    const data = await res.json();
    return data.entries || [];
  } catch(e) {
    console.error('GAS GET error:', e);
    return null;
  }
}

async function gasSave(entry) {
  if (!GAS_ENABLED) return true;
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' }, // avoid CORS preflight
      body: JSON.stringify({ action: 'save', entry: entry })
    });
    return true;
  } catch(e) {
    console.error('GAS POST error:', e);
    return false;
  }
}

async function gasDelete(date) {
  if (!GAS_ENABLED) return true;
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'delete', date: date })
    });
    return true;
  } catch(e) {
    console.error('GAS DELETE error:', e);
    return false;
  }
}

async function gasSaveBulk(entries) {
  if (!GAS_ENABLED) return true;
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'saveBulk', entries: entries })
    });
    return true;
  } catch(e) {
    console.error('GAS BULK error:', e);
    return false;
  }
}

// ===== Init: load from all sources =====
async function initEntries() {
  // 1. ローカルキャッシュを即座に表示
  const local = loadLocal();
  state.entries = mergeEntries([], local, SEED_DATA);
  render();
  
  // 2. スプレッドシートから取得（バックグラウンド）
  if (GAS_ENABLED) {
    state.syncing = true;
    state.syncStatus = '同期中...';
    render();
    
    const sheetEntries = await gasGet();
    if (sheetEntries !== null) {
      state.entries = mergeEntries(sheetEntries, local, SEED_DATA);
      saveLocal();
      state.syncStatus = '✅ 同期済';
      state.lastSync = new Date().toLocaleTimeString('ja-JP');
      
      // シードデータがスプレッドシートにない場合、初回のみ一括送信
      if (sheetEntries.length === 0 && state.entries.length > 0) {
        state.syncStatus = '初期データ送信中...';
        render();
        await gasSaveBulk(state.entries);
        state.syncStatus = '✅ 初期同期完了';
      }
    } else {
      state.syncStatus = '⚠️ オフライン';
    }
    state.syncing = false;
    render();
  }
}

function saveEntries() {
  saveLocal();
}

async function doResync() {
  if(!GAS_ENABLED) return;
  state.syncing=true; state.syncStatus='再同期中...'; render();
  const sheetEntries = await gasGet();
  if(sheetEntries !== null) {
    const local = loadLocal();
    state.entries = mergeEntries(sheetEntries, local, SEED_DATA);
    saveLocal();
    state.syncStatus='✅ 同期済';
    state.lastSync = new Date().toLocaleTimeString('ja-JP');
  } else {
    state.syncStatus='⚠️ 同期失敗';
  }
  state.syncing=false;
  showToast('再同期完了'); render();
}

function showToast(msg) {
  state.toast = msg;
  render();
  setTimeout(() => { state.toast = ''; render(); }, 2500);
}

// ===== Parser =====
function parseGeminiText(text) {
  const e = { date:'', weight:'', bodyFat:'', muscleMass:'', bmi:'', visceralFat:'', basalMetabolism:'', bodyAge:'', boneMass:'', pfc:{p:'',f:'',c:'',cal:''}, meals:{breakfast:'',lunch:'',snack:'',dinner:''}, trainingTarget:'', training:[], theme:'', summary:'', rawText: text };

  // === Date: multiple formats ===
  // Format 1: 【 日付 】 2026/03/14
  let dateM = text.match(/【\s*日付\s*】\s*[:\s]*(\d{4}[\/-]\d{1,2}[\/-]\d{1,2})/);
  // Format 2: 【 3/15 (日) ... 】 or 3/15(日)
  if(!dateM) dateM = text.match(/【[^】]*?(\d{1,2})[\/-](\d{1,2})\s*[（(][日月火水木金土][）)]/);
  if(dateM) {
    if(dateM[1].length===4) {
      const parts = dateM[1].split(/[\/-]/);
      e.date = parts[0]+'-'+parts[1].padStart(2,'0')+'-'+parts[2].padStart(2,'0');
    } else {
      // Month/Day only - assume 2026
      e.date = '2026-'+dateM[1].padStart(2,'0')+'-'+dateM[2].padStart(2,'0');
    }
  }

  // === Body composition ===
  const grab = (label) => { const m = text.match(new RegExp(label+'[：:]\\s*約?\\s*([\\d.]+)')); return m ? m[1] : ''; };
  e.weight=grab('体重'); e.bodyFat=grab('体脂肪率'); e.muscleMass=grab('筋肉量'); e.bmi=grab('BMI');
  e.visceralFat=grab('内臓脂肪レベル'); e.basalMetabolism=grab('基礎代謝量'); e.bodyAge=grab('体内年齢'); e.boneMass=grab('推定骨量');

  // === PFC: multiple formats ===
  // Format 1: P（タンパク質）：約 150 g
  let pM=text.match(/P[（(].*?[）)][：:].*?約?\s*([\d.]+)/);
  let fM=text.match(/F[（(].*?[）)][：:].*?約?\s*([\d.]+)/);
  let cM=text.match(/C[（(].*?[）)][：:].*?約?\s*([\d.]+)/);
  // Format 2: P138g / F28g / C115g
  if(!pM) { const m=text.match(/P\s*(\d+)\s*g/); if(m) pM=m; }
  if(!fM) { const m=text.match(/F\s*(\d+)\s*g/); if(m) fM=m; }
  if(!cM) { const m=text.match(/C\s*(\d+)\s*g/); if(m) cM=m; }
  if(pM) e.pfc.p=pM[1];
  if(fM) e.pfc.f=fM[1];
  if(cM) e.pfc.c=cM[1];
  // Calc cal if not found
  const calM=text.match(/総カロリー[：:].*?約?\s*([\d,]+)/);
  if(calM) e.pfc.cal=calM[1].replace(/,/g,'');
  else if(e.pfc.p&&e.pfc.f&&e.pfc.c) e.pfc.cal=String(Math.round((+e.pfc.p)*4+(+e.pfc.f)*9+(+e.pfc.c)*4));

  // === Training ===
  // Detect target from header: トレーニング記録（胸・肩・三頭＆有酸素）
  const tgtM=text.match(/トレーニング[^\n]*[（(]([^）)]+)[）)]/);
  if(tgtM) e.trainingTarget=tgtM[1].trim();
  if(!e.trainingTarget) { const m2=text.match(/対象部位[：:]\s*(.+)/); if(m2) e.trainingTarget=m2[1].trim(); }

  // Exercises: ① ② ③ ... or ・種目1: ...
  const exPatterns = [
    /[①②③④⑤⑥⑦⑧⑨⑩]\s*(.+)/g,
    /・種目\d+[：:]\s*(.+)/g
  ];
  for(const pat of exPatterns) {
    let match;
    while((match=pat.exec(text))!==null) {
      const line = match[1].trim();
      // Try to extract name from "name：details" or "name / kg / rep × set"
      const colonSplit = line.match(/^([^：:]+)[：:](.+)/);
      if(colonSplit) {
        e.training.push({name:colonSplit[1].trim(), detail:colonSplit[2].trim(), kg:'', reps:'', sets:''});
      } else {
        const slashParts = line.split(/\s*\/\s*/);
        if(slashParts.length>=4) {
          e.training.push({name:slashParts[0], kg:slashParts[1].replace(/\s*kg/i,''), reps:slashParts[2].replace(/\s*rep/i,''), sets:slashParts[3].replace(/\s*set/i,''), detail:''});
        } else {
          e.training.push({name:line, kg:'', reps:'', sets:'', detail:''});
        }
      }
    }
    if(e.training.length>0) break;
  }

  // === Meals: multiple formats ===
  // Format 1: 【朝食】...\n...\n\n or 【昼食】
  function grabMealBlock(label) {
    // Try block format: 【朝食】(description)\n content until next 【 or ■
    const blockM = text.match(new RegExp('【'+label+'】[（(]?([^）)\n]*)[）)]?\\n([\\s\\S]*?)(?=\\n【|\\n■|$)'));
    if(blockM) {
      const header = blockM[1]?.trim() || '';
      const body = blockM[2]?.trim().split('\n').map(l=>l.replace(/^[・\-]\s*/,'').trim()).filter(Boolean).join('、') || '';
      return (header ? header+': ' : '') + body;
    }
    // Try simple: 朝食：content
    const simpleM = text.match(new RegExp(label+'[：:]\\s*(.+)','m'));
    return simpleM ? simpleM[1].trim() : '';
  }
  e.meals.breakfast=grabMealBlock('朝食');
  e.meals.lunch=grabMealBlock('昼食');
  e.meals.snack=grabMealBlock('間食');
  e.meals.dinner=grabMealBlock('夕食');

  // === Theme & Summary ===
  const themeM=text.match(/テーマ[：:]\s*(.+)/);
  if(themeM) e.theme=themeM[1].trim();
  // Summary: 総括 or 総評
  let summaryM=text.match(/(?:総括|総評|振り返り)[^\n]*\n([\s\S]*?)(?=\n■|\n【|$)/);
  if(summaryM) e.summary=summaryM[1].trim();

  return e;
}

// ===== Actions =====
function doParse() {
  if(!state.pasteText.trim()) return;
  state.preview = parseGeminiText(state.pasteText);
  state.view = 'preview';
  render();
}

async function doSave() {
  if(!state.preview) return;
  const entry = {...state.preview};
  const idx = state.entries.findIndex(e=>e.date===entry.date);
  if(idx>=0) state.entries[idx]=entry;
  else state.entries.push(entry);
  state.entries.sort((a,b)=>b.date.localeCompare(a.date));
  saveEntries();
  render();
  
  // GAS sync
  if(GAS_ENABLED) {
    state.syncing=true; state.syncStatus='保存中...'; render();
    const ok = await gasSave(entry);
    state.syncing=false;
    state.syncStatus = ok ? '✅ 同期済' : '⚠️ 保存失敗（ローカルには保存済）';
    if(ok) state.lastSync = new Date().toLocaleTimeString('ja-JP');
  }
  
  showToast(entry.date+' を保存しました');
  state.preview=null; state.pasteText=''; state.view='history';
  render();
}

async function doDelete(date) {
  if(!confirm(date+' のデータを削除しますか？')) return;
  state.entries=state.entries.filter(e=>e.date!==date);
  saveEntries(); render();
  
  if(GAS_ENABLED) {
    state.syncing=true; state.syncStatus='削除中...'; render();
    const ok = await gasDelete(date);
    state.syncing=false;
    state.syncStatus = ok ? '✅ 同期済' : '⚠️ 削除失敗';
    if(ok) state.lastSync = new Date().toLocaleTimeString('ja-JP');
  }
  
  showToast('削除しました'); render();
}

function doExportCSV() {
  if(!state.entries.length) return;
  const h="日付,体重,体脂肪率,筋肉量,BMI,内臓脂肪,基礎代謝,体内年齢,P,F,C,カロリー,対象部位,トレーニング,朝食,昼食,間食,夕食,テーマ,総評\n";
  const rows=state.entries.map(e=>{
    const tr=(e.training||[]).map(t=>`${t.name}${t.kg?' '+t.kg+'kg':''}${t.reps?' '+t.reps+'rep':''}${t.sets?' ×'+t.sets:''}`).join('; ');
    return [e.date,e.weight,e.bodyFat,e.muscleMass,e.bmi,e.visceralFat,e.basalMetabolism,e.bodyAge,e.pfc?.p,e.pfc?.f,e.pfc?.c,e.pfc?.cal,e.trainingTarget,'"'+tr+'"','"'+(e.meals?.breakfast||'')+'"','"'+(e.meals?.lunch||'')+'"','"'+(e.meals?.snack||'')+'"','"'+(e.meals?.dinner||'')+'"','"'+(e.theme||'')+'"','"'+(e.summary||'').replace(/"/g,'""')+'"'].join(',');
  });
  const blob=new Blob(["\uFEFF"+h+rows.join("\n")],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='pfc_log_'+new Date().toISOString().split('T')[0]+'.csv'; a.click();
  showToast('CSVダウンロード完了');
}

function getSummaryText() {
  const recent=state.entries.slice(0,7); if(!recent.length) return '';
  let t=`【直近${recent.length}日間のPFC記録】\n目標: 体重${TARGET.weight}kg / P${TARGET.p}g F${TARGET.f}g C${TARGET.c}g (${TARGET.cal}kcal)\n\n`;
  recent.forEach(e=>{
    t+=`■ ${e.date} | ${e.weight}kg 体脂肪${e.bodyFat}% 筋肉${e.muscleMass}kg\n`;
    t+=`  PFC: P${e.pfc?.p||0}g F${e.pfc?.f||0}g C${e.pfc?.c||0}g (${e.pfc?.cal||0}kcal)\n`;
    if(e.trainingTarget) t+=`  🏋️ ${e.trainingTarget}: ${(e.training||[]).map(x=>x.name).join(', ')}\n`;
    if(e.meals?.breakfast) t+=`  朝:${e.meals.breakfast} 昼:${e.meals.lunch} 夜:${e.meals.dinner}\n`;
    if(e.summary) t+=`  総評: ${e.summary}\n`;
    t+='\n';
  });
  return t;
}

function doCopySummary() {
  const t=getSummaryText(); if(!t) return;
  navigator.clipboard.writeText(t).then(()=>showToast('コピーしました')).catch(()=>{
    // Fallback for iOS
    const ta=document.createElement('textarea'); ta.value=t; ta.style.cssText='position:fixed;left:-9999px';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast('コピーしました');
  });
}

// ===== Render Helpers =====
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function pfcBar(label, val, target, color, unit='g') {
  const v=+(val)||0; const pct=target?Math.min((v/target)*100,120):0; const over=v>target*1.1;
  return `<div class="pfc-bar">
    <div class="pfc-bar-head"><span class="pfc-bar-label">${label}</span><span><span class="pfc-bar-val${over?' over':''}">${v}</span><span class="pfc-bar-target"> / ${target}${unit}</span></span></div>
    <div class="pfc-bar-track"><div class="pfc-bar-fill" style="width:${Math.min(pct,100)}%;background:${over?'var(--red)':color}"></div></div>
  </div>`;
}

function miniStat(label, val, sub, accent) {
  return `<div class="mini-stat"><div class="mini-stat-label">${label}</div><div class="mini-stat-val" style="color:${accent||'var(--text)'}">${val||'-'}</div>${sub?`<div class="mini-stat-sub">${sub}</div>`:''}</div>`;
}

// ===== SVG Chart =====
function weightChart(entries) {
  const data=entries.filter(e=>e.weight).slice(0,21).reverse();
  if(data.length<2) return '<div class="empty">データが2日分以上必要です</div>';
  const weights=data.map(e=>+e.weight); const mn=Math.min(...weights,TARGET.weight)-1; const mx=Math.max(...weights)+1; const rng=mx-mn||1;
  const h=120; const w=Math.max(data.length*30,280);
  const tgtY=h-((TARGET.weight-mn)/rng)*h;
  let svg=`<div class="chart-scroll"><svg width="${w}" height="${h+28}" viewBox="0 0 ${w} ${h+28}">`;
  svg+=`<line x1="0" y1="${tgtY}" x2="${w}" y2="${tgtY}" stroke="var(--purple)" stroke-dasharray="4 4" stroke-width="1" opacity="0.4"/>`;
  svg+=`<text x="4" y="${tgtY-4}" fill="var(--purple)" font-size="8" opacity="0.5">目標${TARGET.weight}</text>`;
  svg+=`<polyline fill="none" stroke="var(--accent)" stroke-width="2" points="${data.map((e,i)=>`${i*30+15},${h-((+e.weight-mn)/rng)*h}`).join(' ')}"/>`;
  data.forEach((e,i)=>{const y=h-((+e.weight-mn)/rng)*h;
    svg+=`<circle cx="${i*30+15}" cy="${y}" r="3" fill="var(--accent)"/>`;
    svg+=`<text x="${i*30+15}" y="${y-7}" fill="#999" font-size="8" text-anchor="middle">${e.weight}</text>`;
    svg+=`<text x="${i*30+15}" y="${h+14}" fill="#444" font-size="7" text-anchor="middle">${e.date.slice(5)}</text>`;
  });
  svg+='</svg></div>';
  return svg;
}

function bodyFatChart(entries) {
  const data=entries.filter(e=>e.bodyFat).slice(0,21).reverse();
  if(data.length<2) return '';
  const vals=data.map(e=>+e.bodyFat); const mn=Math.min(...vals)-1; const mx=Math.max(...vals)+1; const rng=mx-mn||1;
  const h=90; const w=Math.max(data.length*30,280);
  let svg=`<div class="chart-scroll"><svg width="${w}" height="${h+28}" viewBox="0 0 ${w} ${h+28}">`;
  svg+=`<polyline fill="none" stroke="var(--orange)" stroke-width="2" points="${data.map((e,i)=>`${i*30+15},${h-((+e.bodyFat-mn)/rng)*h}`).join(' ')}"/>`;
  data.forEach((e,i)=>{const y=h-((+e.bodyFat-mn)/rng)*h;
    svg+=`<circle cx="${i*30+15}" cy="${y}" r="3" fill="var(--orange)"/>`;
    svg+=`<text x="${i*30+15}" y="${y-7}" fill="#999" font-size="8" text-anchor="middle">${e.bodyFat}%</text>`;
    svg+=`<text x="${i*30+15}" y="${h+14}" fill="#444" font-size="7" text-anchor="middle">${e.date.slice(5)}</text>`;
  });
  svg+='</svg></div>';
  return svg;
}

          html+=`<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">
            <div style="font-size:11px;color:var(--sub);font-weight:600;letter-spacing:1px;margin-bottom:4px">📝 SUMMARY</div>
            <div style="font-size:12px;color:#999;line-height:1.6">${esc(e.summary)}</div>
          </div>`;
        }

        html+=`<button class="btn-delete" onclick="event.stopPropagation();doDelete('${e.date}')">削除</button>`;
        html+=`</div>`;
      }
      html+=`</div>`;
    });
  }

  // ===== TRENDS =====
  if(state.view==='trends') {
    html+=`<div class="card"><div class="stats-grid">
      ${miniStat('平均体重',avgW,'直近7日','var(--accent)')}${miniStat('記録',state.entries.length,'日','var(--green)')}${miniStat('目標',TARGET.weight,'kg','var(--orange)')}
    </div></div>`;

    if(state.entries.filter(e=>e.weight).length>1) {
      html+=`<div class="card"><div class="card-label">WEIGHT TREND</div>${weightChart(state.entries)}</div>`;
    }
    const bfHtml=bodyFatChart(state.entries);
    if(bfHtml) html+=`<div class="card"><div class="card-label">BODY FAT % TREND</div>${bfHtml}</div>`;

    if(last7.length>0) {
      const avg={p:0,f:0,c:0,cal:0};
      last7.forEach(e=>{avg.p+=(+e.pfc?.p||0);avg.f+=(+e.pfc?.f||0);avg.c+=(+e.pfc?.c||0);avg.cal+=(+e.pfc?.cal||0);});
      const n=last7.length;
      html+=`<div class="card"><div class="card-label">7日間平均 PFC</div>
        ${pfcBar('P avg',Math.round(avg.p/n),TARGET.p,'var(--purple)')}${pfcBar('F avg',Math.round(avg.f/n),TARGET.f,'var(--orange)')}
        ${pfcBar('C avg',Math.round(avg.c/n),TARGET.c,'var(--green)')}${pfcBar('CAL avg',Math.round(avg.cal/n),TARGET.cal,'var(--accent)','kcal')}
      </div>`;
    }
    html+=`<button class="btn btn-primary" onclick="doCopySummary()">📋 直近7日サマリーをコピー</button>`;
    html+=`<div class="note">ClaudeやGeminiに貼り付けてフィードバックを受けられます</div>`;
  }

  html+='</div>'; // content
  document.getElementById('app').innerHTML = html;
}

// ===== Init =====
initEntries();
</script>
</body>
</html>
